services:
  # Django Backend
  - type: web
    name: eeshtronics-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /admin/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: eeshtronics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eeshtronics-redis
          type: redis
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: eeshtronics-db
    env: docker
    plan: free
    region: oregon
    image:
      url: postgres:15-alpine
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_DB
        value: engineerlab
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Redis
  - type: redis
    name: eeshtronics-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []
